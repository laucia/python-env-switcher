# Runs the extension test suite on every push to main, across all three
# platforms. VS Code extension tests launch a real (Electron) VS Code
# instance; on Linux that needs a virtual display, hence xvfb.

trigger:
  branches:
    include:
      - main

# Only run on pushes to main, not on pull requests.
pr: none

jobs:
  - job: test
    strategy:
      matrix:
        linux:
          imageName: ubuntu-latest
        mac:
          imageName: macOS-latest
        windows:
          imageName: windows-latest
    pool:
      vmImage: $(imageName)
    steps:
      - task: UseNode@1
        inputs:
          version: 22.x
        displayName: Use Node.js 22.x

      - script: npm ci
        displayName: Install dependencies

      - script: npm run check-types
        displayName: Type-check

      - script: npm run lint
        displayName: Lint

      # The Electron-based VS Code test host needs a display; only Linux
      # agents lack one, so start xvfb there.
      - bash: |
          /usr/bin/Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          disown
        displayName: Start xvfb (Linux only)
        condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))

      # `npm test` first runs `pretest` (compile-tests + compile + lint).
      # DISPLAY is used only on Linux; it is harmless on macOS/Windows.
      - script: npm test
        displayName: Run tests
        env:
          DISPLAY: ':99'

  # Derive the next version from the Conventional Commits since the last
  # release, bump package.json/CHANGELOG, tag, and publish a GitHub Release.
  # Runs once (Linux), only on main, only after every test leg passes.
  - job: release
    dependsOn: test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    pool:
      vmImage: ubuntu-latest
    variables:
      # GH_TOKEN (the GitHub PAT for pushing tags/commits and creating the
      # Release) lives in this variable group.
      - group: VSCode Extension
      # Skip the husky commit-msg hook on semantic-release's bump commit.
      - name: HUSKY
        value: "0"
    steps:
      - checkout: self
        # semantic-release needs full history + tags to analyze commits.
        fetchDepth: 0
        persistCredentials: true

      - task: UseNode@1
        inputs:
          version: 22.x
        displayName: Use Node.js 22.x

      - script: npm ci
        displayName: Install dependencies

      - script: npx semantic-release
        displayName: Release
        env:
          GH_TOKEN: $(GH_TOKEN)

      # Did semantic-release cut a new version this run? (a vX.Y.Z tag now
      # points at HEAD). Gate the publish on this so the Azure task — which
      # needs the service connection — is skipped entirely on no-release runs.
      - script: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          if git tag --points-at HEAD | grep -qx "v$VERSION"; then
            echo "Release v$VERSION detected; will publish to Marketplace"
            echo "##vso[task.setvariable variable=published]true"
          else
            echo "No new release this run; skipping Marketplace publish"
            echo "##vso[task.setvariable variable=published]false"
          fi
        displayName: Check for new release

      # Publish to the VS Marketplace, only on a fresh release. Auth uses
      # Microsoft Entra ID via the service connection (no PAT) — the AzureCLI
      # task logs in, and `vsce publish --azure-credential` reuses that session.
      - task: AzureCLI@2
        displayName: Publish to Marketplace
        condition: and(succeeded(), eq(variables['published'], 'true'))
        inputs:
          azureSubscription: $(MARKETPLACE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: npx vsce publish --azure-credential

  # One-time setup helper (publishing-extension docs, step 5): prints the
  # managed identity's Marketplace profile so you can add it as a member of the
  # publisher. Run the pipeline once, read this job's output, then DELETE this
  # job — it does not need to run on every release.
  - job: identity_details
    pool:
      vmImage: ubuntu-latest
    variables:
      # MARKETPLACE_SERVICE_CONNECTION (the service connection name) lives here.
      - group: VSCode Extension
    steps:
      - task: AzureCLI@2
        displayName: Get identity details
        inputs:
          azureSubscription: $(MARKETPLACE_SERVICE_CONNECTION)
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: |
            az rest -u https://app.vssps.visualstudio.com/_apis/profile/profiles/me --resource 499b84ac-1321-427f-aa17-267ca6975798
